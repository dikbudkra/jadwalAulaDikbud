<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Aula Disdikbud</title>
    
    <!-- Favicon Logo Karanganyar -->
    <link rel="icon" href="https://i.ibb.co.com/rGLcRm9W/500px-Seal-of-Karanganyar-Regency-svg.png" type="image/png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Mencegah scrollbar ganda */
            background-color: #333; /* Background gelap agar selaras saat loading */
        }
        
        iframe {
            width: 100%;
            /* Trik menyembunyikan banner GAS: Tinggi ditambah, posisi ditarik ke atas */
            height: calc(100% + 38px);
            border: none;
            position: absolute;
            top: -38px; 
            left: 0;
            z-index: 10;
        }
        
        .loading-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Poppins', sans-serif;
            position: absolute;
            width: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- Animasi Loading saat menunggu respons dari Google -->
    <div class="loading-container">
        <svg class="animate-spin h-10 w-10 text-white mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="font-semibold tracking-wide">Memuat Sistem...</p>
    </div>

    <!-- Masukkan URL Web App GAS hasil New Deployment di bagian src ini -->
    <iframe src="https://script.google.com/macros/s/AKfycbxu8sV3xJnsYkFFOM-MXfzcugoHJ8lgo8e5Iz6U0a_NEWgW-rzxV3fVYZ4t8u7R71k/exec" allow="fullscreen" allowfullscreen></iframe>

</body>
</html>
